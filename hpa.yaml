apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpapod
  namespace: krishna
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deploymentname # This need to match with the deployment Name
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30
