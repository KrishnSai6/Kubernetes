apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: repliacset
  namespace: krishna
spec:
  replicas: 2
  selector:
    matchLabels:
      app: replicaset
  template:
    metadata:
      labels:
        app: replicaset
    spec:
      containers:
        - name: replicasetcontainer
          image: krishna639/krishna6:1.0.1
          ports:
            - containerPort: 9000
